<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">

    <title>Mailing Service</title>

    <!-- BOOTSTRAP -->
    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
        rel="stylesheet"
    >

</head>

<body>

<nav class="navbar navbar-dark bg-dark navbar-expand-lg">

    <div class="container">

        <!-- ЛОГО -->
        <a class="navbar-brand" href="{% url 'home' %}">
            Mailing Service
        </a>


        <!-- МЕНЮ -->
        <div class="d-flex gap-2">

            <a class="btn btn-light"
               href="{% url 'mailing_list' %}">
                Рассылки
            </a>

            <a class="btn btn-light"
               href="{% url 'recipient_list' %}">
                Клиенты
            </a>

            <a class="btn btn-light"
               href="{% url 'message_list' %}">
                Сообщения
            </a>

            <a class="btn btn-light"
               href="{% url 'attempt_list' %}">
                Попытки
            </a>

        </div>


        <!-- ПРАВАЯ ЧАСТЬ -->
        <div class="d-flex gap-2">

            {% if user.is_authenticated %}

                <a class="btn btn-info"
                   href="{% url 'profile' %}">
                    Профиль
                </a>

                <form action="{% url 'logout' %}"
                      method="post"
                      class="d-inline">

                    {% csrf_token %}

                    <button type="submit"
                            class="btn btn-danger">

                        Выход

                    </button>

                </form>

            {% else %}

                <a class="btn btn-success"
                   href="{% url 'login' %}">
                    Вход
                </a>

                <a class="btn btn-primary"
                   href="{% url 'register' %}">
                    Регистрация
                </a>

            {% endif %}

        </div>

    </div>

</nav>



<div class="container mt-4">

    {% block content %}
    {% endblock %}

</div>

</body>
</html>
