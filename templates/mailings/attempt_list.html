{% extends "base.html" %}

{% block content %}

<div class="container">

<h2>Попытки рассылки</h2>

<table class="table">

<tr>
    <th>Дата</th>
    <th>Статус</th>
    <th>Ответ</th>
</tr>

{% for a in object_list %}

<tr>
    <td>{{ a.created_at }}</td>
    <td>{{ a.status }}</td>
    <td>{{ a.response }}</td>
</tr>

{% endfor %}

</table>

</div>

{% endblock %}
