{% extends "base.html" %}

{% block title %}Создать получателя{% endblock %}

{% block content %}
<div class="container mt-5">
    <h2>Создать получателя</h2>
    <form method="post">
        {% csrf_token %}
        {{ form.non_field_errors }}
        <div class="mb-3">
            <label for="id_email" class="form-label">Email</label>
            <input type="email" name="email" class="form-control" id="id_email" value="{{ form.email.value|default_if_none:'' }}">
            {{ form.email.errors }}
        </div>
        <div class="mb-3">
            <label for="id_full_name" class="form-label">ФИО</label>
            <input type="text" name="full_name" class="form-control" id="id_full_name" value="{{ form.full_name.value|default_if_none:'' }}">
            {{ form.full_name.errors }}
        </div>
        <div class="mb-3">
            <label for="id_comment" class="form-label">Комментарий</label>
            <textarea name="comment" class="form-control" id="id_comment">{{ form.comment.value|default_if_none:'' }}</textarea>
            {{ form.comment.errors }}
        </div>
        <button type="submit" class="btn btn-success">Создать</button>
        <a href="{% url 'recipient_list' %}" class="btn btn-secondary">Отмена</a>
    </form>
</div>
{% endblock %}
